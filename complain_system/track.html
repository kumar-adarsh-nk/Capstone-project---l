<!DOCTYPE html>
<html>
<head>
<title>Track Complaint</title>
<link rel="stylesheet" href="complaint.css">
</head>

<style>

  *{
    box-sizing: border-box;
  }

  body {
    display: flex;
    align-content: center;
    justify-content: center;
  }



  .container{
    background-color: beige;
    height: 300px;
    width: 350px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 10%;
    display: block;
  }

</style>
<body>

<div class="container">
<h2>Track Complaint</h2>

<input type="text" id="trackId" placeholder="Enter Complaint ID">
<button onclick="trackComplaint()">Track</button>

<div id="result"></div>

</div>

<script>
function trackComplaint(){
  let id = document.getElementById("trackId").value;
  let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

  let found = complaints.find(c => c.id === id);

  if(found){
    document.getElementById("result").innerHTML =
      `<p><b>Name:</b> ${found.name}</p>
       <p><b>Issue:</b> ${found.issue}</p>
       <p><b>Status:</b> ${found.status}</p>`;
  } else {
    document.getElementById("result").innerText = "Complaint not found";
  }
}
</script>

</body>
</html>
